<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind (РАБОЧИЙ CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>ApplesStore</title>
</head>
<body class="bg-gray-100">

    <!-- NAVBAR -->
    <nav class="bg-gray-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">

                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <span class="text-lg font-semibold">🍎 ApplesStore</span>
                </div>

                <!-- Links -->
                <div class="hidden md:flex items-center gap-6">
                    <a href="{% url 'index' %}" class="hover:text-blue-400">Bosh sahifa</a>
                    <a href="{% url 'contacts' %}" class="hover:text-blue-400">Kontaktlar</a>
                    <a href="{% url 'services' %}" class="hover:text-blue-400">Xizmatlarimiz</a>

                    {% if request.user.is_authenticated %}
                        <a href="{% url 'profile' %}" class="hover:text-blue-400">Profil</a>
                    {% endif %}
                </div>

                <!-- Right -->
                <div class="flex items-center gap-3">

                    <!-- Search -->
                    <form class="hidden md:flex bg-gray-800 rounded-lg px-2 py-1">
                        <input type="text" placeholder="Qidirish..."
                               class="bg-transparent outline-none text-sm px-2">
                    </form>

                    {% if request.user.is_authenticated %}
                        <a href="{% url 'add_product' %}"
                           class="bg-blue-500 hover:bg-blue-600 px-3 py-1 rounded-lg text-sm">
                            + Qo'shish
                        </a>

                        <a href="{% url 'logout' %}"
                           class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded-lg text-sm">
                            Chiqish
                        </a>
                    {% else %}
                        <a href="{% url 'login' %}"
                           class="bg-blue-500 hover:bg-blue-600 px-3 py-1 rounded-lg text-sm">
                            Kirish
                        </a>
                    {% endif %}
                </div>

            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="max-w-7xl mx-auto p-4">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
