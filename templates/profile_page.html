{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center">Profile page</h1>

    <div class="card w-50 m-auto p-3 mt-4">
        <p><b>Username:</b> {{ request.user.username }}</p>
        <p><b>Email:</b> {{ request.user.email }}</p>

        <a href="{% url 'logout' %}" class="btn btn-danger w-100 mt-3">
            Logout
        </a>
    </div>
</div>
{% endblock content %}
