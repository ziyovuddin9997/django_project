{% extends 'base.html' %}


{% block content %}
    <div class="container">
        <h1 class="text-center mt-5 mb-5">Maxsulot ma'lumotlarini tahrirlash</h1>

        <form method="post" class="w-50 m-auto d-flex flex-column gap-3" action="">
            {% csrf_token %}
            <input value="{{ product.name }}" name="name" type="text" class="form-control" placeholder="Maxsulot nomi" required minlength="5" autofocus>
            <input value="{{ product.price }}" name="price" type="number" class="form-control" placeholder="Maxsulot narxi" required min="0">
            <input name="image" type="file" class="form-control" placeholder="Maxsulot rasmi">

            <div class="d-flex flex-row align-items-center">
                <p>Maxsulot eski rasmi:</p>
                <img src="{{ product.image.url }}" alt="" width="100" height="100">
            </div>

            <button class="w-100 btn btn-warning" type="submit">O'zgartirish</button>
        </form>

    </div>
{% endblock content %}
